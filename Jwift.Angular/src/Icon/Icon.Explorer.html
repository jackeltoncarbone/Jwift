<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jwift Icons — SF Symbols Variable Font</title>
<style>
  @font-face {
    font-family: 'JwiftIcons';
    src: url('Icon.Source.otf') format('opentype');
    font-weight: 100 900;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1e1e1e;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #5e9eff;
    --icon-size: 28px;
    --icon-color: #e0e0e0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header / Controls */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .controls-top {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .controls h1 {
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
  }

  .controls h1 span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 13px;
    margin-left: 8px;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box::before {
    content: '\2315';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
  }

  .controls-sliders {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .slider-group label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 50px;
  }

  .slider-group input[type="range"] {
    width: 180px;
    accent-color: var(--accent);
  }

  .slider-group .value {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    min-width: 32px;
    text-align: right;
    color: var(--accent);
  }

  .color-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-group label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .color-group input[type="color"] {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    cursor: pointer;
    padding: 2px;
  }

  .match-count {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 2px;
    padding: 24px;
  }

  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 8px;
    user-select: none;
  }

  .icon-card:hover { background: var(--surface-hover); }
  .icon-card:active { background: var(--border); }

  .icon-card .glyph {
    font-family: 'JwiftIcons', sans-serif;
    font-size: var(--icon-size);
    line-height: 1;
    color: var(--icon-color);
    /* weight set via JS */
  }

  .icon-card .name {
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    word-break: break-all;
    line-height: 1.2;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Detail panel */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
  }

  .detail-overlay.active { display: flex; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    min-width: 360px;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .detail-panel .preview {
    font-family: 'JwiftIcons', sans-serif;
    font-size: 80px;
    line-height: 1;
    color: var(--icon-color);
  }

  .detail-panel .icon-name {
    font-size: 16px;
    font-weight: 500;
  }

  .detail-panel .weight-samples {
    display: flex;
    gap: 12px;
    align-items: baseline;
    flex-wrap: wrap;
    justify-content: center;
  }

  .detail-panel .weight-sample {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .detail-panel .weight-sample .glyph {
    font-family: 'JwiftIcons', sans-serif;
    font-size: 28px;
    color: var(--icon-color);
  }

  .detail-panel .weight-sample .label {
    font-size: 9px;
    color: var(--text-dim);
  }

  .detail-panel .css-snippet {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--accent);
    width: 100%;
    word-break: break-all;
    cursor: pointer;
    position: relative;
  }

  .detail-panel .css-snippet:hover::after {
    content: 'Click to copy';
    position: absolute;
    right: 8px;
    top: 8px;
    font-size: 10px;
    color: var(--text-dim);
  }

  .detail-panel .close-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    padding: 6px 16px;
    cursor: pointer;
    font-size: 13px;
  }

  .detail-panel .close-btn:hover { background: var(--surface-hover); color: var(--text); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #000;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 300;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="controls">
  <div class="controls-top">
    <h1>Jwift Icons <span id="glyphCount"></span></h1>
    <div class="search-box">
      <input type="text" id="search" placeholder="Search icons..." autocomplete="off" spellcheck="false">
    </div>
    <span class="match-count" id="matchCount"></span>
  </div>
  <div class="controls-sliders">
    <div class="slider-group">
      <label>Weight</label>
      <input type="range" id="weightSlider" min="100" max="900" step="1" value="400">
      <span class="value" id="weightValue">400</span>
    </div>
    <div class="slider-group">
      <label>Size</label>
      <input type="range" id="sizeSlider" min="12" max="80" step="1" value="28">
      <span class="value" id="sizeValue">28</span>
    </div>
    <div class="color-group">
      <label>Color</label>
      <input type="color" id="colorPicker" value="#e0e0e0">
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel">
    <div class="preview" id="detailPreview"></div>
    <div class="icon-name" id="detailName"></div>
    <div class="weight-samples" id="weightSamples"></div>
    <div class="css-snippet" id="cssSnippet" title="Click to copy"></div>
    <button class="close-btn" id="closeDetail">Close</button>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

function renderGrid(icons) {
  const grid = document.getElementById('grid');
  // Use DocumentFragment for performance
  const frag = document.createDocumentFragment();

  for (const icon of icons) {
    const card = document.createElement('div');
    card.className = 'icon-card';
    card.dataset.name = icon.name;
    card.dataset.cp = icon.cp;

    const glyph = document.createElement('div');
    glyph.className = 'glyph';
    glyph.textContent = String.fromCodePoint(icon.cp);
    glyph.style.fontWeight = currentWeight;

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = icon.name;

    card.appendChild(glyph);
    card.appendChild(name);
    card.addEventListener('click', () => showDetail(icon));
    frag.appendChild(card);
  }

  grid.innerHTML = '';
  grid.appendChild(frag);
}

function updateGlyphs() {
  document.querySelectorAll('.icon-card .glyph').forEach(el => {
    el.style.fontWeight = currentWeight;
    el.style.fontSize = currentSize + 'px';
    el.style.color = currentColor;
  });
  // Update detail if open
  const preview = document.getElementById('detailPreview');
  if (preview) {
    preview.style.fontWeight = currentWeight;
    preview.style.color = currentColor;
  }
}

const weightValue = document.getElementById('weightValue');
weightSlider.addEventListener('input', () => {
  currentWeight = parseInt(weightSlider.value);
  weightValue.textContent = currentWeight;
  updateGlyphs();
});

  currentSize = parseInt(sizeSlider.value);
  sizeValue.textContent = currentSize;
  document.documentElement.style.setProperty('--icon-size', currentSize + 'px');
  updateGlyphs();
});

// Color picker
const colorPicker = document.getElementById('colorPicker');
colorPicker.addEventListener('input', () => {
  currentColor = colorPicker.value;
  document.documentElement.style.setProperty('--icon-color', currentColor);
  updateGlyphs();
});

// Search
let searchTimeout;
document.getElementById('search').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = e.target.value.toLowerCase().trim();
    const filtered = q
      ? ICONS.filter(i => i.name.toLowerCase().includes(q))
      : ICONS;
    renderGrid(filtered);
    document.getElementById('matchCount').textContent = `${filtered.length} shown`;
  }, 150);
});

// Detail panel
function showDetail(icon) {
  const overlay = document.getElementById('detailOverlay');
  const preview = document.getElementById('detailPreview');
  const nameEl = document.getElementById('detailName');
  const samplesEl = document.getElementById('weightSamples');
  const snippetEl = document.getElementById('cssSnippet');

  const char = String.fromCodePoint(icon.cp);

  preview.textContent = char;
  preview.style.fontWeight = currentWeight;
  preview.style.color = currentColor;
  nameEl.textContent = icon.name;

  // Weight samples
  const weights = [
    {w: 100, label: 'Ultra Light'},
    {w: 200, label: 'Thin'},
    {w: 300, label: 'Light'},
    {w: 400, label: 'Regular'},
    {w: 500, label: 'Medium'},
    {w: 600, label: 'Semibold'},
    {w: 700, label: 'Bold'},
    {w: 800, label: 'Heavy'},
    {w: 900, label: 'Black'},
  ];

  samplesEl.innerHTML = '';
  for (const {w, label} of weights) {
    const sample = document.createElement('div');
    sample.className = 'weight-sample';
    const g = document.createElement('div');
    g.className = 'glyph';
    g.textContent = char;
    g.style.fontWeight = w;
    g.style.color = currentColor;
    const l = document.createElement('div');
    l.className = 'label';
    l.textContent = label;
    sample.appendChild(g);
    sample.appendChild(l);
    samplesEl.appendChild(sample);
  }

  // CSS snippet
  const cpHex = icon.cp.toString(16).toUpperCase();
  snippetEl.textContent = `.icon-${icon.name.replace(/\./g, '-')} { font-family: 'JwiftIcons'; content: '\\${cpHex}'; font-weight: ${currentWeight}; }`;

  snippetEl.onclick = () => {
    navigator.clipboard.writeText(snippetEl.textContent);
    showToast('Copied CSS!');
  };

  overlay.classList.add('active');
}

document.getElementById('closeDetail').addEventListener('click', () => {
  document.getElementById('detailOverlay').classList.remove('active');
});

document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('active');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('detailOverlay').classList.remove('active');
  }
});

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}
</script>
</body>
</html>
